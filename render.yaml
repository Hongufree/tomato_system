services:
  - type: web
    name: tomato-backend
    runtime: java
    rootDir: backend
    plan: free
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/magic_conch_backend-0.0.1-SNAPSHOT.jar
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: APP_CORS_ALLOWED_ORIGINS
        value: https://your-project.vercel.app
