spring.application.name=magic_conch_backend

deepseek.api.base-url=https://api.deepseek.com
deepseek.api.chat-path=/chat/completions
deepseek.api.api-key=${DEEPSEEK_API_KEY:}
deepseek.api.model=deepseek-chat
deepseek.api.system-prompt=You are a professional tomato-growing expert. Provide practical and accurate advice about tomato cultivation, diseases and pests, irrigation and fertilization, harvesting, yield, quality, and greenhouse management. If the user's question is incomplete, give the safest useful guidance first and mention what key details are still needed.
server.port=8082
